<!DOCTYPE html>
<html>
    <head>
        <title>Jetverse</title>
        <link rel="stylesheet" href="styles.css"
    </head>
    <body>
        <h1 class="title">Welcome to Jetverse.</h1>
        <div class="user-island">
            <button id="signupButton">Sign Up</button>
            <button id="loginButton">Log In</button>
        </div>
        <div class="main-options">
            <div class="option build-option">
                <svg class="opt-img" viewBox="0 0 8 4">
                    <path d="M 0 2 L 2 0 L 2 1 L 1 2 L 2 3 L 2 4 M 3 4 L 4 0 L 5 0 L 4 4 M 6 4 L 8 2 L 6 0 L 6 1 L 7 2 L 6 3" fill="white"/>
                </svg>
                <h2>Build</h2>
                <span>Create your own games.</span>
                <a href="./jetcore/index.html">Start Now</a>
            </div>
            <div class="option play-option">
                <svg class="opt-img" viewBox="0 0 4 6">
                    <path d="M 0 0 L 4 3 L 0 6" fill="white"/>
                </svg>
                <h2>Play</h2>
                <span>Play games created by others.</span>
                <a>Play</a>
            </div>
        </div>
    </body>
</html>
